<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leitor de Código de Barras</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header { padding: 1rem 1.25rem 0.75rem; border-bottom: 1px solid #222; }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header p  { font-size: 0.78rem; color: #888; margin-top: 2px; }

    #camera-section {
      position: relative;
      width: 100%;
      background: #000;
      aspect-ratio: 4/3;
      overflow: hidden;
      flex-shrink: 0;
    }

    #video { width: 100%; height: 100%; object-fit: cover; display: block; }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scan-frame {
      width: 70%;
      max-width: 260px;
      aspect-ratio: 2.5/1;
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 8px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
      position: relative;
      display: none;
    }

    .scan-line {
      position: absolute;
      left: 6px; right: 6px; height: 2px;
      background: linear-gradient(90deg, transparent, #22c55e, transparent);
      animation: scan 2s linear infinite;
    }

    @keyframes scan { 0% { top: 8%; } 100% { top: 88%; } }

    .corner { position: absolute; width: 14px; height: 14px; border-color: #22c55e; border-style: solid; }
    .corner.tl { top:-2px; left:-2px;    border-width: 3px 0 0 3px; border-radius: 3px 0 0 0; }
    .corner.tr { top:-2px; right:-2px;   border-width: 3px 3px 0 0; border-radius: 0 3px 0 0; }
    .corner.bl { bottom:-2px; left:-2px;  border-width: 0 0 3px 3px; border-radius: 0 0 0 3px; }
    .corner.br { bottom:-2px; right:-2px; border-width: 0 3px 3px 0; border-radius: 0 0 3px 0; }

    #start-btn {
      background: #22c55e; color: #fff; border: none;
      padding: 0.75rem 1.75rem; border-radius: 50px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
    }

    #status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 0.6rem 1.25rem;
      background: #161616; border-bottom: 1px solid #222;
      font-size: 0.8rem; color: #888;
    }

    .dot { width: 7px; height: 7px; border-radius: 50%; background: #444; flex-shrink: 0; }
    .dot.active { background: #22c55e; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    #results-section { flex: 1; overflow-y: auto; padding: 0.75rem 1.25rem; }

    .results-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .results-header span {
      font-size: 0.78rem; color: #888; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .btn-small {
      background: none; border: 1px solid #333; color: #888;
      padding: 3px 10px; border-radius: 20px; font-size: 0.72rem;
      cursor: pointer; margin-left: 6px;
    }

    .empty-state { text-align: center; padding: 2.5rem 1rem; color: #444; font-size: 0.85rem; }

    .barcode-item {
      display: flex; align-items: center; gap: 12px;
      padding: 0.65rem 0.9rem;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 8px; margin-bottom: 8px;
      cursor: pointer; animation: slideIn 0.2s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    .barcode-item.copied { border-color: #22c55e; }

    .item-index  { font-size: 0.7rem; color: #555; font-weight: 600; min-width: 20px; }
    .item-code   { flex: 1; font-family: monospace; font-size: 0.9rem; color: #e8e8e8; word-break: break-all; }
    .item-format { font-size: 0.65rem; color: #555; background: #242424; border: 1px solid #2e2e2e; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
    .item-time   { font-size: 0.65rem; color: #555; }

    #toast {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #22c55e; color: #fff;
      padding: 0.5rem 1.25rem; border-radius: 50px;
      font-size: 0.82rem; font-weight: 500;
      opacity: 0; transition: opacity .2s, transform .2s;
      pointer-events: none; z-index: 100;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    #error-msg {
      display: none;
      background: #2a1010; border: 1px solid #5a2020; color: #f87171;
      padding: 0.75rem 1rem; margin: 0.75rem 1.25rem;
      border-radius: 8px; font-size: 0.82rem; line-height: 1.5;
    }
  </style>
</head>
<body>

<header>
  <h1>📷 Leitor de Código de Barras</h1>
  <p>Aponte a câmera — os códigos acumulam abaixo</p>
</header>

<section id="camera-section">
  <video id="video" autoplay playsinline muted></video>
  <div id="overlay">
    <div class="scan-frame" id="scan-frame">
      <div class="scan-line"></div>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
    </div>
    <button id="start-btn">Iniciar Câmera</button>
  </div>
</section>

<div id="error-msg"></div>

<div id="status-bar">
  <div class="dot" id="status-dot"></div>
  <span id="status-text">Câmera inativa</span>
  <span style="margin-left:auto;font-size:0.75rem;" id="count-badge"></span>
</div>

<section id="results-section">
  <div class="results-header">
    <span>Leituras</span>
    <div>
      <button class="btn-small" id="copy-all-btn">Copiar todos</button>
      <button class="btn-small" id="clear-btn">Limpar</button>
    </div>
  </div>
  <div id="results-list">
    <div class="empty-state">Nenhum código lido ainda</div>
  </div>
</section>

<div id="toast"></div>

<script>
  var video       = document.getElementById('video');
  var startBtn    = document.getElementById('start-btn');
  var scanFrame   = document.getElementById('scan-frame');
  var statusDot   = document.getElementById('status-dot');
  var statusText  = document.getElementById('status-text');
  var countBadge  = document.getElementById('count-badge');
  var resultsList = document.getElementById('results-list');
  var clearBtn    = document.getElementById('clear-btn');
  var copyAllBtn  = document.getElementById('copy-all-btn');
  var toast       = document.getElementById('toast');
  var errorMsg    = document.getElementById('error-msg');

  var results  = [];
  var lastCode = '';
  var lastTime = 0;
  var scanning = false;
  var canvas, ctx, detector;

  function showToast(msg, color) {
    toast.textContent = msg;
    toast.style.background = color || '#22c55e';
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 1800);
  }

  function showError(msg) {
    errorMsg.style.display = 'block';
    errorMsg.innerHTML = msg;
    startBtn.disabled = false;
    startBtn.textContent = 'Tentar novamente';
    statusText.textContent = 'Erro';
  }

  function renderResults() {
    countBadge.textContent = results.length
      ? results.length + ' leitura' + (results.length > 1 ? 's' : '') : '';

    if (!results.length) {
      resultsList.innerHTML = '<div class="empty-state">Nenhum código lido ainda</div>';
      return;
    }

    resultsList.innerHTML = results.map(function(r, i) {
      return '<div class="barcode-item" data-i="' + i + '">'
        + '<span class="item-index">' + (i+1) + '</span>'
        + '<span class="item-code">' + r.code + '</span>'
        + '<span class="item-format">' + r.format + '</span>'
        + '<span class="item-time">' + r.time + '</span>'
        + '</div>';
    }).join('');

    resultsList.querySelectorAll('.barcode-item').forEach(function(el) {
      el.addEventListener('click', function() {
        navigator.clipboard.writeText(results[+el.dataset.i].code).then(function() {
          el.classList.add('copied');
          setTimeout(function() { el.classList.remove('copied'); }, 800);
          showToast('Copiado!');
        });
      });
    });
  }

  function addResult(code, format) {
    var now = Date.now();
    if (code === lastCode && now - lastTime < 2500) return;
    lastCode = code;
    lastTime = now;
    results.unshift({ code: code, format: format, time: new Date().toLocaleTimeString('pt-BR') });
    renderResults();
    statusText.textContent = 'Lido: ' + code.slice(0, 28) + (code.length > 28 ? '…' : '');
    showToast('✓ Código capturado!');
  }

  function scanLoop() {
    if (!scanning) return;
    if (video.readyState < 2) { requestAnimationFrame(scanLoop); return; }

    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    detector.detect(canvas).then(function(barcodes) {
      barcodes.forEach(function(b) {
        if (b.rawValue) addResult(b.rawValue, b.format);
      });
      setTimeout(scanLoop, 300);
    }).catch(function() {
      setTimeout(scanLoop, 300);
    });
  }

  function startScanner() {
    startBtn.disabled = true;
    startBtn.textContent = 'Aguarde…';
    errorMsg.style.display = 'none';
    statusText.textContent = 'Verificando suporte…';

    // Verifica suporte nativo
    if (!('BarcodeDetector' in window)) {
      showError(
        '⚠️ Seu navegador não suporta a API nativa de leitura de código de barras.<br><br>' +
        'Use <strong>Chrome 83+</strong> no Android ou desktop.<br>' +
        'Safari/Firefox ainda não suportam essa API.'
      );
      return;
    }

    detector = new BarcodeDetector({
      formats: [
        'ean_13','ean_8','upc_a','upc_e',
        'code_128','code_39','code_93',
        'qr_code','data_matrix','itf',
        'pdf417','aztec','codabar'
      ]
    });

    canvas = document.createElement('canvas');
    ctx    = canvas.getContext('2d');

    statusText.textContent = 'Solicitando câmera…';

    navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    }).then(function(stream) {
      video.srcObject = stream;
      return video.play();
    }).then(function() {
      startBtn.style.display  = 'none';
      scanFrame.style.display = 'block';
      statusDot.classList.add('active');
      statusText.textContent = 'Escaneando…';
      scanning = true;
      scanLoop();
    }).catch(function(err) {
      showError('Erro ao acessar a câmera: ' + err.message + '<br><br>Verifique se o site está em HTTPS e se a permissão de câmera foi concedida.');
    });
  }

  startBtn.addEventListener('click', startScanner);

  clearBtn.addEventListener('click', function() {
    if (!results.length || !confirm('Limpar todas as leituras?')) return;
    results = []; lastCode = '';
    renderResults();
  });

  copyAllBtn.addEventListener('click', function() {
    if (!results.length) { showToast('Nada para copiar', '#888'); return; }
    var text = results.map(function(r, i) { return (i+1) + '. ' + r.code; }).join('\n');
    navigator.clipboard.writeText(text).then(function() {
      showToast(results.length + ' códigos copiados!');
    });
  });

  renderResults();
</script>
</body>
</html>
