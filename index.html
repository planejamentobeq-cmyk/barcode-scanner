<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leitor de Código de Barras</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid #222;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    header p {
      font-size: 0.78rem;
      color: #888;
      margin-top: 2px;
    }

    #camera-section {
      position: relative;
      width: 100%;
      background: #000;
      aspect-ratio: 4/3;
      overflow: hidden;
      flex-shrink: 0;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .scan-frame {
      width: 70%;
      max-width: 260px;
      aspect-ratio: 2.5/1;
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 8px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
      position: relative;
    }

    .scan-line {
      position: absolute;
      left: 6px;
      right: 6px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #22c55e, transparent);
      animation: scan 2s linear infinite;
      top: 0;
    }

    @keyframes scan {
      0%   { top: 8%; opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 88%; opacity: 0; }
    }

    .corner {
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: #22c55e;
      border-style: solid;
    }
    .corner.tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 3px 0 0 0; }
    .corner.tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 3px 0 0; }
    .corner.bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; border-radius: 0 0 0 3px; }
    .corner.br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 3px 0; }

    #start-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #22c55e;
      color: #fff;
      border: none;
      padding: 0.75rem 1.75rem;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      pointer-events: all;
      transition: background 0.15s;
    }

    #start-btn:hover { background: #16a34a; }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0.6rem 1.25rem;
      background: #161616;
      border-bottom: 1px solid #222;
      font-size: 0.8rem;
      color: #888;
      flex-shrink: 0;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
    }

    .dot.active { background: #22c55e; animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #results-section {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 1.25rem;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .results-header span {
      font-size: 0.78rem;
      color: #888;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #clear-btn {
      background: none;
      border: 1px solid #333;
      color: #888;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    #clear-btn:hover { border-color: #e74c3c; color: #e74c3c; }

    #copy-all-btn {
      background: none;
      border: 1px solid #333;
      color: #888;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    #copy-all-btn:hover { border-color: #22c55e; color: #22c55e; }

    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #444;
    }

    .empty-state svg {
      width: 40px;
      height: 40px;
      margin-bottom: 0.75rem;
      opacity: 0.3;
    }

    .empty-state p { font-size: 0.85rem; }

    .barcode-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0.65rem 0.9rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      margin-bottom: 8px;
      animation: slideIn 0.2s ease;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .barcode-item:hover { border-color: #444; }

    .barcode-item.copied { border-color: #22c55e; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-index {
      font-size: 0.7rem;
      color: #555;
      font-weight: 600;
      min-width: 20px;
    }

    .item-code {
      flex: 1;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      color: #e8e8e8;
      word-break: break-all;
    }

    .item-format {
      font-size: 0.65rem;
      color: #555;
      background: #242424;
      border: 1px solid #2e2e2e;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .item-time {
      font-size: 0.65rem;
      color: #555;
    }

    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #22c55e;
      color: #fff;
      padding: 0.5rem 1.25rem;
      border-radius: 50px;
      font-size: 0.82rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<header>
  <h1>📷 Leitor de Código de Barras</h1>
  <p>Aponte a câmera — os códigos são acumulados abaixo</p>
</header>

<section id="camera-section">
  <video id="video" autoplay playsinline muted></video>
  <div id="overlay">
    <div class="scan-frame" id="scan-frame" style="display:none;">
      <div class="scan-line"></div>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>
    <button id="start-btn">Iniciar Câmera</button>
  </div>
</section>

<div id="status-bar">
  <div class="dot" id="status-dot"></div>
  <span id="status-text">Câmera inativa</span>
  <span style="margin-left: auto; font-size: 0.75rem;" id="count-badge"></span>
</div>

<section id="results-section">
  <div class="results-header">
    <span>Leituras</span>
    <div style="display: flex; gap: 6px;">
      <button id="copy-all-btn" title="Copiar todos">Copiar todos</button>
      <button id="clear-btn" title="Limpar lista">Limpar</button>
    </div>
  </div>
  <div id="results-list">
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="6" height="6" rx="1"/>
        <rect x="15" y="3" width="6" height="6" rx="1"/>
        <rect x="3" y="15" width="6" height="6" rx="1"/>
        <path d="M15 15h2v2h-2zM17 17h4M17 15v4M21 15v.01M15 21v.01M19 21h2M21 19v2"/>
      </svg>
      <p>Nenhum código lido ainda</p>
    </div>
  </div>
</section>

<div id="toast"></div>

<script type="module">
  import { BrowserMultiFormatReader, NotFoundException } from 'https://esm.sh/@zxing/browser@0.1.5';
  import { DecodeHintType } from 'https://esm.sh/@zxing/library@0.20.0';

  const video        = document.getElementById('video');
  const startBtn     = document.getElementById('start-btn');
  const scanFrame    = document.getElementById('scan-frame');
  const statusDot    = document.getElementById('status-dot');
  const statusText   = document.getElementById('status-text');
  const countBadge   = document.getElementById('count-badge');
  const resultsList  = document.getElementById('results-list');
  const clearBtn     = document.getElementById('clear-btn');
  const copyAllBtn   = document.getElementById('copy-all-btn');
  const toast        = document.getElementById('toast');

  let scanning   = false;
  let codeReader = null;
  let results    = [];
  let lastCode   = '';
  let lastTime   = 0;
  let streamRef  = null;

  function showToast(msg, color = '#22c55e') {
    toast.textContent = msg;
    toast.style.background = color;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  function formatTime(date) {
    return date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function renderResults() {
    if (results.length === 0) {
      resultsList.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="6" height="6" rx="1"/><rect x="15" y="3" width="6" height="6" rx="1"/>
          <rect x="3" y="15" width="6" height="6" rx="1"/>
          <path d="M15 15h2v2h-2zM17 17h4M17 15v4M21 15v.01M15 21v.01M19 21h2M21 19v2"/>
        </svg>
        <p>Nenhum código lido ainda</p></div>`;
      countBadge.textContent = '';
      return;
    }

    countBadge.textContent = `${results.length} leitura${results.length > 1 ? 's' : ''}`;
    resultsList.innerHTML = results.map((r, i) => `
      <div class="barcode-item" data-index="${i}" title="Clique para copiar">
        <span class="item-index">${i + 1}</span>
        <span class="item-code">${r.code}</span>
        <span class="item-format">${r.format}</span>
        <span class="item-time">${r.time}</span>
      </div>
    `).join('');

    resultsList.querySelectorAll('.barcode-item').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.index);
        navigator.clipboard.writeText(results[idx].code).then(() => {
          el.classList.add('copied');
          setTimeout(() => el.classList.remove('copied'), 1000);
          showToast('Copiado!');
        });
      });
    });
  }

  function addResult(code, format) {
    const now = Date.now();
    if (code === lastCode && now - lastTime < 2000) return;
    lastCode = code;
    lastTime = now;

    results.unshift({ code, format, time: formatTime(new Date()) });
    renderResults();

    statusText.textContent = `Lido: ${code.slice(0, 30)}${code.length > 30 ? '…' : ''}`;
    showToast('✓ Código capturado!');
  }

  async function startScanner() {
    try {
      statusText.textContent = 'Solicitando câmera…';
      startBtn.disabled = true;

      const hints = new Map();
      codeReader = new BrowserMultiFormatReader(hints);

      const devices = await BrowserMultiFormatReader.listVideoInputDevices();
      const backCamera = devices.find(d =>
        /back|rear|environment/i.test(d.label)
      ) || devices[devices.length - 1];

      const deviceId = backCamera?.deviceId;

      const stream = await navigator.mediaDevices.getUserMedia({
        video: { deviceId: deviceId ? { exact: deviceId } : undefined, facingMode: 'environment' }
      });
      streamRef = stream;
      video.srcObject = stream;

      startBtn.style.display = 'none';
      scanFrame.style.display = 'block';
      statusDot.classList.add('active');
      statusText.textContent = 'Escaneando…';
      scanning = true;

      codeReader.decodeFromStream(stream, video, (result, err) => {
        if (result) addResult(result.getText(), result.getBarcodeFormat().toString());
      });

    } catch (err) {
      console.error(err);
      statusText.textContent = 'Erro: ' + (err.message || 'Permissão negada');
      startBtn.disabled = false;
      showToast('Permissão da câmera negada', '#e74c3c');
    }
  }

  startBtn.addEventListener('click', startScanner);

  clearBtn.addEventListener('click', () => {
    if (!results.length) return;
    if (confirm('Limpar todas as leituras?')) {
      results = [];
      lastCode = '';
      renderResults();
    }
  });

  copyAllBtn.addEventListener('click', () => {
    if (!results.length) { showToast('Nada para copiar', '#888'); return; }
    const text = results.map((r, i) => `${i + 1}. ${r.code}`).join('\n');
    navigator.clipboard.writeText(text).then(() => showToast(`${results.length} códigos copiados!`));
  });

  renderResults();
</script>
</body>
</html>
