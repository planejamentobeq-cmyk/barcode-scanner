<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leitor de Código de Barras</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f; color: #f0f0f0;
      min-height: 100dvh; display: flex; flex-direction: column;
    }

    header {
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid #222;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .header-text h1 { font-size: 1rem; font-weight: 600; }
    .header-text p  { font-size: 0.73rem; color: #888; margin-top: 1px; }

    .header-btns { display: flex; gap: 8px; align-items: center; }

    #torch-btn {
      width: 38px; height: 38px; border-radius: 50%;
      border: 1px solid #333; background: #1a1a1a;
      font-size: 1.1rem; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    #torch-btn.on { background: #facc15; border-color: #facc15; }

    #camera-section {
      position: relative; width: 100%; background: #000;
      aspect-ratio: 3/4; overflow: hidden; flex-shrink: 0;
    }

    #video { width: 100%; height: 100%; object-fit: cover; display: block; }

    #overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }

    .scan-frame {
      width: 85%; max-width: 340px; aspect-ratio: 3/1;
      border: 2.5px solid rgba(255,255,255,0.7);
      border-radius: 10px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
      position: relative; display: none;
    }
    .scan-frame.dup { border-color: #f97316; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5), 0 0 0 3px #f97316; }

    .scan-line {
      position: absolute; left: 8px; right: 8px; height: 2px;
      background: linear-gradient(90deg, transparent, #22c55e 20%, #22c55e 80%, transparent);
      animation: scan 1.5s ease-in-out infinite alternate;
    }
    @keyframes scan { 0% { top: 8%; } 100% { top: 88%; } }

    .corner { position: absolute; width: 18px; height: 18px; border-color: #22c55e; border-style: solid; }
    .corner.tl { top:-2px; left:-2px;    border-width: 4px 0 0 4px; border-radius: 4px 0 0 0; }
    .corner.tr { top:-2px; right:-2px;   border-width: 4px 4px 0 0; border-radius: 0 4px 0 0; }
    .corner.bl { bottom:-2px; left:-2px;  border-width: 0 0 4px 4px; border-radius: 0 0 0 4px; }
    .corner.br { bottom:-2px; right:-2px; border-width: 0 4px 4px 0; border-radius: 0 0 4px 0; }

    #hint {
      position: absolute; bottom: 10px; left: 0; right: 0;
      text-align: center; font-size: 0.7rem;
      color: rgba(255,255,255,0.55); display: none;
    }

    #start-btn {
      background: #22c55e; color: #fff; border: none;
      padding: 0.75rem 1.75rem; border-radius: 50px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
    }

    /* ── barra de status ── */
    #status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 0.5rem 1.25rem;
      background: #161616; border-bottom: 1px solid #222;
      font-size: 0.78rem; color: #888;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #444; flex-shrink: 0; }
    .dot.active { background: #22c55e; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── entrada manual ── */
    #manual-bar {
      display: flex; gap: 8px; padding: 0.6rem 1.25rem;
      border-bottom: 1px solid #222; background: #141414;
    }
    #manual-input {
      flex: 1; background: #1e1e1e; border: 1px solid #333;
      color: #f0f0f0; padding: 0.45rem 0.75rem;
      border-radius: 8px; font-size: 0.85rem; outline: none;
    }
    #manual-input:focus { border-color: #22c55e; }
    #manual-add-btn {
      background: #22c55e; color: #fff; border: none;
      padding: 0.45rem 1rem; border-radius: 8px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer; white-space: nowrap;
    }

    /* ── lista ── */
    #results-section { flex: 1; overflow-y: auto; padding: 0.75rem 1.25rem; }

    .results-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .results-header span {
      font-size: 0.76rem; color: #888; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .header-actions { display: flex; gap: 6px; }
    .btn-small {
      background: none; border: 1px solid #333; color: #888;
      padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; cursor: pointer;
    }
    .btn-small.green { border-color: #22c55e; color: #22c55e; }

    .empty-state { text-align: center; padding: 2.5rem 1rem; color: #444; font-size: 0.85rem; }

    .barcode-item {
      display: flex; align-items: center; gap: 10px;
      padding: 0.6rem 0.85rem;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 8px; margin-bottom: 7px;
      cursor: pointer; animation: slideIn 0.2s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }

    .barcode-item.dup   { border-left: 3px solid #f97316; background: #1e1610; }
    .barcode-item.manual { border-left: 3px solid #facc15; }
    .barcode-item.copied { border-color: #22c55e !important; }

    .item-index  { font-size: 0.68rem; color: #555; font-weight: 600; min-width: 18px; }
    .item-code   { flex: 1; font-family: monospace; font-size: 0.88rem; color: #e8e8e8; word-break: break-all; }
    .item-right  { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
    .item-format { font-size: 0.62rem; color: #555; background: #242424; border: 1px solid #2e2e2e; padding: 1px 6px; border-radius: 4px; }
    .item-time   { font-size: 0.62rem; color: #555; }
    .dup-badge   { font-size: 0.6rem; background: #7c2d12; color: #fb923c; border: 1px solid #9a3412; padding: 1px 5px; border-radius: 4px; }

    /* ── toast ── */
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(10px);
      color: #fff; padding: 0.5rem 1.25rem; border-radius: 50px;
      font-size: 0.82rem; font-weight: 500;
      opacity: 0; transition: opacity .2s, transform .2s;
      pointer-events: none; z-index: 100; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    #error-msg {
      display: none;
      background: #2a1010; border: 1px solid #5a2020; color: #f87171;
      padding: 0.75rem 1rem; margin: 0.75rem 1.25rem;
      border-radius: 8px; font-size: 0.82rem; line-height: 1.6;
    }
  </style>
</head>
<body>

<header>
  <div class="header-text">
    <h1>📷 Leitor de Código de Barras</h1>
    <p>Aponte a câmera — os códigos acumulam abaixo</p>
  </div>
  <div class="header-btns">
    <button id="torch-btn" title="Flash">🔦</button>
  </div>
</header>

<section id="camera-section">
  <video id="video" autoplay playsinline muted></video>
  <div id="overlay">
    <div class="scan-frame" id="scan-frame">
      <div class="scan-line"></div>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
    </div>
    <button id="start-btn">Iniciar Câmera</button>
  </div>
  <div id="hint">Alinhe o código dentro do quadro</div>
</section>

<div id="error-msg"></div>

<div id="status-bar">
  <div class="dot" id="status-dot"></div>
  <span id="status-text">Câmera inativa</span>
  <span style="margin-left:auto;font-size:0.73rem;" id="count-badge"></span>
</div>

<div id="manual-bar">
  <input id="manual-input" type="text" placeholder="Digitar código manualmente…" autocomplete="off" />
  <button id="manual-add-btn">+ Adicionar</button>
</div>

<section id="results-section">
  <div class="results-header">
    <span id="results-label">Leituras</span>
    <div class="header-actions">
      <button class="btn-small green" id="excel-btn">⬇ Excel</button>
      <button class="btn-small" id="copy-all-btn">Copiar todos</button>
      <button class="btn-small" id="clear-btn">Limpar</button>
    </div>
  </div>
  <div id="results-list">
    <div class="empty-state">Nenhum código lido ainda</div>
  </div>
</section>

<div id="toast"></div>

<script>
  var video        = document.getElementById('video');
  var startBtn     = document.getElementById('start-btn');
  var scanFrame    = document.getElementById('scan-frame');
  var hint         = document.getElementById('hint');
  var torchBtn     = document.getElementById('torch-btn');
  var statusDot    = document.getElementById('status-dot');
  var statusText   = document.getElementById('status-text');
  var countBadge   = document.getElementById('count-badge');
  var resultsList  = document.getElementById('results-list');
  var resultsLabel = document.getElementById('results-label');
  var clearBtn     = document.getElementById('clear-btn');
  var copyAllBtn   = document.getElementById('copy-all-btn');
  var excelBtn     = document.getElementById('excel-btn');
  var manualInput  = document.getElementById('manual-input');
  var manualAddBtn = document.getElementById('manual-add-btn');
  var toast        = document.getElementById('toast');
  var errorMsg     = document.getElementById('error-msg');

  var results   = [];
  var lastCode  = '';
  var lastTime  = 0;
  var scanning  = false;
  var torchOn   = false;
  var activeTrack = null;
  var canvas, ctx, detector;
  var frameCount = 0;
  var audioCtx   = null;

  /* ── áudio ── */
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function beep(freq, dur, vol, type) {
    try {
      var ac  = getAudioCtx();
      var osc = ac.createOscillator();
      var gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.type = type || 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol || 0.4, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + dur);
    } catch(e) {}
  }

  function beepOk() {
    // bip curto agudo — leitura nova
    beep(1046, 0.12, 0.5, 'sine');
  }

  function beepDup() {
    // dois bips graves — duplicata
    beep(420, 0.1, 0.4, 'square');
    setTimeout(function() { beep(320, 0.15, 0.4, 'square'); }, 120);
  }

  /* ── toast ── */
  function showToast(msg, color) {
    toast.textContent = msg;
    toast.style.background = color || '#22c55e';
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 2000);
  }

  function showError(msg) {
    errorMsg.style.display = 'block';
    errorMsg.innerHTML = msg;
    startBtn.disabled = false;
    startBtn.textContent = 'Tentar novamente';
    statusText.textContent = 'Erro';
  }

  /* ── detecta duplicatas ── */
  function isDuplicate(code) {
    return results.some(function(r) { return r.code === code; });
  }

  /* ── renderiza lista ── */
  function renderResults() {
    var total = results.length;
    var dups  = results.filter(function(r) { return r.dup; }).length;

    countBadge.textContent = total
      ? total + ' leitura' + (total > 1 ? 's' : '') + (dups ? ' · ' + dups + ' dup.' : '')
      : '';

    resultsLabel.textContent = dups
      ? 'Leituras (' + dups + ' duplicada' + (dups > 1 ? 's' : '') + ')'
      : 'Leituras';

    if (!total) {
      resultsList.innerHTML = '<div class="empty-state">Nenhum código lido ainda</div>';
      return;
    }

    resultsList.innerHTML = results.map(function(r, i) {
      var cls = r.dup ? ' dup' : (r.manual ? ' manual' : '');
      var badge = r.dup
        ? '<span class="dup-badge">DUPLICATA</span>'
        : (r.manual ? '<span class="dup-badge" style="background:#713f12;color:#fde047;border-color:#854d0e;">MANUAL</span>' : '');
      return '<div class="barcode-item' + cls + '" data-i="' + i + '">'
        + '<span class="item-index">' + (i + 1) + '</span>'
        + '<span class="item-code">' + r.code + '</span>'
        + '<div class="item-right">'
        + '<span class="item-format">' + r.format + '</span>'
        + badge
        + '<span class="item-time">' + r.time + '</span>'
        + '</div>'
        + '</div>';
    }).join('');

    resultsList.querySelectorAll('.barcode-item').forEach(function(el) {
      el.addEventListener('click', function() {
        navigator.clipboard.writeText(results[+el.dataset.i].code).then(function() {
          el.classList.add('copied');
          setTimeout(function() { el.classList.remove('copied'); }, 700);
          showToast('Copiado!');
        });
      });
    });
  }

  /* ── adiciona resultado ── */
  function addResult(code, format, manual) {
    var now = Date.now();
    // debounce para câmera (não para manual)
    if (!manual && code === lastCode && now - lastTime < 3000) return;
    lastCode = code;
    lastTime = now;

    var dup = isDuplicate(code);

    if (dup) {
      beepDup();
      // flash laranja no frame
      scanFrame.classList.add('dup');
      setTimeout(function() { scanFrame.classList.remove('dup'); }, 600);
      showToast('⚠ Duplicata: ' + code.slice(0, 20), '#f97316');
    } else {
      beepOk();
      showToast('✓ ' + code.slice(0, 22));
    }

    results.unshift({
      code: code,
      format: format,
      time: new Date().toLocaleTimeString('pt-BR'),
      dup: dup,
      manual: !!manual
    });

    renderResults();
    statusText.textContent = (dup ? '⚠ Dup: ' : 'Lido: ') + code.slice(0, 24) + (code.length > 24 ? '…' : '');
  }

  /* ── scan loop ── */
  function scanLoop() {
    if (!scanning) return;
    if (video.readyState < 2 || video.videoWidth === 0) { requestAnimationFrame(scanLoop); return; }

    frameCount++;
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    if (frameCount % 30 === 0) {
      statusText.textContent = 'Escaneando… (' + video.videoWidth + 'x' + video.videoHeight + ')';
    }

    detector.detect(canvas)
      .then(function(barcodes) {
        barcodes.forEach(function(b) { if (b.rawValue) addResult(b.rawValue, b.format, false); });
        setTimeout(scanLoop, 150);
      })
      .catch(function() { setTimeout(scanLoop, 150); });
  }

  /* ── flash / tocha ── */
  function setTorch(on) {
    if (!activeTrack) return;
    activeTrack.applyConstraints({ advanced: [{ torch: on }] })
      .then(function() {
        torchOn = on;
        torchBtn.classList.toggle('on', on);
        torchBtn.title = on ? 'Desligar flash' : 'Ligar flash';
      })
      .catch(function() { showToast('Flash não disponível neste dispositivo', '#888'); });
  }

  torchBtn.addEventListener('click', function() { setTorch(!torchOn); });

  /* ── iniciar scanner ── */
  function startScanner() {
    startBtn.disabled = true;
    startBtn.textContent = 'Aguarde…';
    errorMsg.style.display = 'none';
    statusText.textContent = 'Verificando suporte…';

    if (!('BarcodeDetector' in window)) {
      showError('⚠️ Seu navegador não suporta leitura de código de barras.<br><br>Use <strong>Chrome no Android</strong> ou Chrome desktop.');
      return;
    }

    BarcodeDetector.getSupportedFormats().then(function(supported) {
      var wanted = ['ean_13','ean_8','upc_a','upc_e','code_128','code_39','code_93','qr_code','data_matrix','itf','pdf417','aztec','codabar'];
      var formats = wanted.filter(function(f) { return supported.indexOf(f) >= 0; });
      if (!formats.length) formats = supported;

      detector = new BarcodeDetector({ formats: formats });
      canvas   = document.createElement('canvas');
      ctx      = canvas.getContext('2d');
      statusText.textContent = 'Abrindo câmera…';

      return navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920, min: 640 }, height: { ideal: 1080, min: 480 } }
      });
    })
    .then(function(stream) {
      video.srcObject = stream;
      // guarda track para controlar o flash
      activeTrack = stream.getVideoTracks()[0];

      // verifica se flash é suportado e mostra botão
      var caps = activeTrack.getCapabilities ? activeTrack.getCapabilities() : {};
      if (caps.torch) {
        torchBtn.style.display = 'flex';
        // liga flash automaticamente
        setTorch(true);
      }

      return video.play();
    })
    .then(function() {
      startBtn.style.display  = 'none';
      scanFrame.style.display = 'block';
      hint.style.display      = 'block';
      statusDot.classList.add('active');
      statusText.textContent  = 'Escaneando…';
      scanning = true;
      setTimeout(scanLoop, 500);
    })
    .catch(function(err) {
      showError('Erro ao acessar a câmera: <strong>' + err.message + '</strong><br><br>Verifique se o site está em HTTPS e se a permissão de câmera foi concedida.');
    });
  }

  startBtn.addEventListener('click', startScanner);

  /* ── adicionar manual ── */
  function addManual() {
    var code = manualInput.value.trim();
    if (!code) { manualInput.focus(); return; }
    addResult(code, 'manual', true);
    manualInput.value = '';
    manualInput.focus();
  }
  manualAddBtn.addEventListener('click', addManual);
  manualInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') addManual(); });

  /* ── limpar ── */
  clearBtn.addEventListener('click', function() {
    if (!results.length || !confirm('Limpar todas as leituras?')) return;
    results = []; lastCode = '';
    renderResults();
  });

  /* ── copiar todos ── */
  copyAllBtn.addEventListener('click', function() {
    if (!results.length) { showToast('Nada para copiar', '#888'); return; }
    var text = results.map(function(r, i) { return (i+1) + '. ' + r.code; }).join('\n');
    navigator.clipboard.writeText(text).then(function() { showToast(results.length + ' códigos copiados!'); });
  });

  /* ── exportar Excel (CSV com BOM para Excel abrir corretamente) ── */
  excelBtn.addEventListener('click', function() {
    if (!results.length) { showToast('Nada para exportar', '#888'); return; }

    var rows = [['#', 'Código', 'Formato', 'Horário', 'Duplicata', 'Manual']];
    results.forEach(function(r, i) {
      rows.push([
        i + 1,
        r.code,
        r.format,
        r.time,
        r.dup    ? 'Sim' : 'Não',
        r.manual ? 'Sim' : 'Não'
      ]);
    });

    var csv = '\uFEFF' + rows.map(function(row) {
      return row.map(function(cell) {
        var s = String(cell);
        if (s.indexOf(',') >= 0 || s.indexOf('"') >= 0 || s.indexOf('\n') >= 0) {
          s = '"' + s.replace(/"/g, '""') + '"';
        }
        return s;
      }).join(',');
    }).join('\r\n');

    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href     = url;
    a.download = 'codigos_' + new Date().toISOString().slice(0, 10) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
    showToast('✓ Excel baixado!');
  });

  renderResults();
</script>
</body>
</html>
